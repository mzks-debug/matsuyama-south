      --shadow-sm:0 1px 3px rgba(0,0,0,.08); --shadow-md:0 4px 12px rgba(0,0,0,.12);
      --tr:0.18s ease;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html{font-size:16px;-webkit-text-size-adjust:100%}
    body{font-family:'Hiragino Kaku Gothic ProN','Hiragino Sans','BIZ UDPGothic',sans-serif;background:var(--gray-50);color:var(--gray-800);min-height:100vh;padding-bottom:68px}
    a{color:inherit;text-decoration:none}
    button{cursor:pointer;font-family:inherit;border:none;outline:none}
    input,select,textarea{font-family:inherit;font-size:1rem;width:100%;padding:.65rem .8rem;border:1.5px solid var(--gray-400);border-radius:var(--radius-sm);background:var(--white);color:var(--gray-800);transition:border-color var(--tr);outline:none}
    input:focus,select:focus,textarea:focus{border-color:var(--navy)}
    textarea{resize:vertical;min-height:80px}

    /* TOPBAR */
    .topbar{position:sticky;top:0;z-index:100;background:var(--navy);color:var(--white);display:flex;align-items:center;justify-content:space-between;padding:.7rem 1rem;box-shadow:var(--shadow-md)}
    .topbar__logo{display:flex;align-items:center;gap:.5rem}
    .topbar__logo img{width:34px;height:34px;border-radius:6px;object-fit:cover}
    .topbar__title{font-size:.9rem;font-weight:700;color:var(--gold)}
    .topbar__right{display:flex;align-items:center;gap:.4rem}
    .topbar__user{font-size:.72rem;color:rgba(255,255,255,.7)}
    .topbar__logout{background:rgba(255,255,255,.15);color:var(--white);border:1px solid rgba(255,255,255,.3);border-radius:var(--radius-sm);font-size:.72rem;padding:.28rem .6rem}

    /* BOTTOM NAV */
    .bottom-nav{position:fixed;bottom:0;left:0;right:0;z-index:100;background:var(--white);border-top:1.5px solid var(--gray-200);display:flex;box-shadow:0 -2px 8px rgba(0,0,0,.08);padding-bottom:env(safe-area-inset-bottom)}
    .nav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:.5rem .2rem .4rem;color:var(--gray-600);font-size:.62rem;font-weight:500;gap:.16rem;transition:color var(--tr);-webkit-tap-highlight-color:transparent;background:none;border:none}
    .nav-item svg{width:20px;height:20px}
    .nav-item.active{color:var(--navy)}
    .nav-item.active svg{stroke:var(--navy)}

    /* PAGES */
    .page{display:none;padding:1rem;max-width:600px;margin:0 auto}
    .page.active{display:block}
    .page-header{margin-bottom:1.1rem}
    .page-header h1{font-size:1.05rem;font-weight:700;color:var(--navy)}
    .page-header p{font-size:.78rem;color:var(--gray-600);margin-top:.2rem}

    /* CARDS */
    .card{background:var(--white);border-radius:var(--radius-md);box-shadow:var(--shadow-sm);padding:.9rem;margin-bottom:.7rem}
    .card--click{cursor:pointer;transition:box-shadow var(--tr);-webkit-tap-highlight-color:transparent}
    .card--click:active{box-shadow:var(--shadow-md)}
    .card__title{font-size:.9rem;font-weight:700;color:var(--navy);margin-bottom:.2rem}
    .card__sub{font-size:.78rem;color:var(--gray-600)}
    .card__footer{margin-top:.55rem;padding-top:.55rem;border-top:1px solid var(--gray-100);display:flex;align-items:center;justify-content:space-between}

    /* SECTION */
    .section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:.45rem}
    .section-title{font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--navy);display:flex;align-items:center;gap:.28rem}
    .section-title::before{content:'';display:block;width:3px;height:12px;background:var(--gold);border-radius:2px}
    .more-link{font-size:.72rem;color:var(--navy);cursor:pointer}

    /* BADGES */
    .badge{display:inline-block;font-size:.66rem;font-weight:700;padding:.16rem .48rem;border-radius:20px;line-height:1.4}
    .badge--practice{background:#e8f4f8;color:#1a6b8a}
    .badge--friendly{background:#fff3e0;color:#b35c00}
    .badge--official{background:#fce4ec;color:#b71c1c}
    .badge--win{background:#e8f5e9;color:#2e7d32}
    .badge--lose{background:#fce4ec;color:#c62828}
    .badge--draw{background:var(--gray-100);color:var(--gray-600)}
    .badge--admin{background:var(--navy);color:var(--white)}
    .badge--parent{background:var(--gray-200);color:var(--gray-800)}

    /* BUTTONS */
    .btn{display:inline-flex;align-items:center;justify-content:center;gap:.35rem;padding:.62rem 1rem;border-radius:var(--radius-sm);font-size:.86rem;font-weight:600;transition:background var(--tr),opacity var(--tr);-webkit-tap-highlight-color:transparent;border:none}
    .btn:disabled{opacity:.5;pointer-events:none}
    .btn--primary{background:var(--navy);color:var(--white)}
    .btn--gold{background:var(--gold);color:var(--white)}
    .btn--danger{background:var(--red);color:var(--white)}
    .btn--ghost{background:transparent;color:var(--navy);border:1.5px solid var(--navy)}
    .btn--sm{padding:.38rem .75rem;font-size:.76rem}
    .btn--full{width:100%}

    .fab{position:fixed;bottom:74px;right:.9rem;width:48px;height:48px;border-radius:50%;background:var(--gold);color:var(--white);display:none;align-items:center;justify-content:center;box-shadow:0 4px 14px rgba(201,162,39,.45);font-size:1.4rem;z-index:90;border:none;-webkit-tap-highlight-color:transparent}

    /* SCORE */
    .score-display{display:flex;align-items:center;justify-content:center;gap:.6rem;margin:.45rem 0}
    .score-display__team{font-size:.72rem;color:var(--gray-600);text-align:center}
    .score-display__num{font-size:1.9rem;font-weight:800;color:var(--navy);min-width:1.8rem;text-align:center}
    .score-display__vs{font-size:.82rem;color:var(--gray-400);font-weight:600}

    /* FORM */
    .form-group{margin-bottom:.85rem}
    .form-label{display:block;font-size:.78rem;font-weight:600;color:var(--gray-800);margin-bottom:.28rem}
    .form-row{display:grid;grid-template-columns:1fr 1fr;gap:.55rem}

    /* ATT */
    .att-btns{display:grid;grid-template-columns:repeat(3,1fr);gap:.35rem}
    .att-btn{padding:.55rem .35rem;border-radius:var(--radius-sm);font-size:.95rem;font-weight:700;border:2px solid var(--gray-300);background:var(--white);color:var(--gray-600);transition:all var(--tr)}
    .att-btn.sel-○{background:#e8f5e9;border-color:#2e7d32;color:#2e7d32}
    .att-btn.sel-△{background:#fff8e1;border-color:#f9a825;color:#f9a825}
    .att-btn.sel-×{background:#fce4ec;border-color:#c62828;color:#c62828}
    .att-player-row{display:flex;align-items:center;gap:.55rem;padding:.6rem 0;border-bottom:1px solid var(--gray-100)}
    .att-player-name{flex:1;font-size:.85rem;font-weight:600}

    /* PLAYERS */
    .player-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(135px,1fr));gap:.5rem}
    .player-card{background:var(--white);border-radius:var(--radius-md);padding:.75rem .65rem;box-shadow:var(--shadow-sm);text-align:center;cursor:pointer;-webkit-tap-highlight-color:transparent}
    .player-card__num{font-size:1.45rem;font-weight:800;color:var(--navy);line-height:1.1}
    .player-card__name{font-size:.82rem;font-weight:700;margin:.22rem 0 .12rem}
    .player-card__meta{font-size:.68rem;color:var(--gray-600)}
    .grade-label{font-size:.68rem;font-weight:700;color:var(--navy);letter-spacing:.05em;text-transform:uppercase;margin:.65rem 0 .3rem}

    /* MODAL */
    .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:150;display:flex;align-items:flex-end;justify-content:center}
    .modal-overlay.hidden{display:none}
    .modal{background:var(--white);border-radius:var(--radius-lg) var(--radius-lg) 0 0;padding:1rem .95rem 2rem;width:100%;max-width:600px;max-height:90vh;overflow-y:auto}
    .modal__header{display:flex;align-items:center;justify-content:space-between;margin-bottom:.85rem}
    .modal__title{font-size:.92rem;font-weight:700;color:var(--navy)}
    .modal__close{background:var(--gray-100);border-radius:50%;width:27px;height:27px;display:flex;align-items:center;justify-content:center;font-size:.95rem;color:var(--gray-600);border:none}

    /* LOADING / EMPTY */
    .loading{display:flex;align-items:center;justify-content:center;padding:2.5rem 1rem;color:var(--gray-600);gap:.45rem;font-size:.85rem}
    .spinner{width:17px;height:17px;border:2.5px solid var(--gray-200);border-top-color:var(--navy);border-radius:50%;animation:spin .7s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    .empty-state{text-align:center;padding:2.2rem 1rem;color:var(--gray-600)}
    .empty-state__icon{font-size:2.1rem;margin-bottom:.55rem}
    .empty-state__title{font-size:.88rem;font-weight:600;margin-bottom:.28rem}
    .empty-state__sub{font-size:.76rem}

    /* TOAST */
    .toast-container{position:fixed;bottom:78px;left:50%;transform:translateX(-50%);z-index:200;display:flex;flex-direction:column;gap:.35rem;pointer-events:none}
    .toast{background:var(--gray-800);color:var(--white);padding:.55rem .95rem;border-radius:20px;font-size:.8rem;font-weight:500;white-space:nowrap;animation:tin .25s ease,tout .3s ease 2.5s forwards;box-shadow:var(--shadow-md)}
    .toast--success{background:var(--green)}
    .toast--error{background:var(--red)}
    @keyframes tin{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
    @keyframes tout{from{opacity:1}to{opacity:0}}

    /* MEMBER */
    .member-row{display:flex;align-items:center;gap:.55rem;padding:.6rem 0;border-bottom:1px solid var(--gray-100);cursor:pointer}
    .member-row:last-child{border-bottom:none}
    .member-avatar{width:32px;height:32px;border-radius:50%;background:var(--navy);color:var(--white);display:flex;align-items:center;justify-content:center;font-size:.82rem;font-weight:700;flex-shrink:0}
    .member-info{flex:1;min-width:0}
    .member-name{font-size:.85rem;font-weight:600}
    .member-email{font-size:.68rem;color:var(--gray-600);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .player-tags{display:flex;flex-wrap:wrap;gap:.18rem;margin-top:.18rem}
    .player-tag{background:var(--gray-100);color:var(--gray-700);font-size:.64rem;padding:.1rem .38rem;border-radius:10px}

    /* INVITE */
    .invite-box{background:var(--navy);color:var(--white);border-radius:var(--radius-md);padding:.85rem;margin-bottom:1rem}
    .invite-box__title{font-size:.8rem;font-weight:700;margin-bottom:.45rem}
    .invite-url{background:rgba(255,255,255,.12);border-radius:var(--radius-sm);padding:.45rem .65rem;font-size:.7rem;word-break:break-all;margin:.35rem 0;font-family:monospace}

    /* LOGIN */
    #loginScreen{position:fixed;inset:0;background:var(--navy);display:flex;align-items:center;justify-content:center;z-index:300;padding:1.5rem}
    .login-card{background:var(--white);border-radius:var(--radius-lg);padding:1.9rem 1.4rem;width:100%;max-width:350px;box-shadow:0 8px 32px rgba(0,0,0,.25)}
    .login-logo{text-align:center;margin-bottom:1.4rem}
    .login-logo img.icon{width:68px;height:68px;border-radius:12px;object-fit:cover;margin:0 auto .5rem;display:block}
    .login-logo img.teamlogo{width:170px;margin:.4rem auto 0;display:block;border-radius:4px}
    .login-logo__sub{font-size:.74rem;color:var(--gray-600);margin-top:.35rem}
    .btn-google{width:100%;padding:.72rem;border-radius:var(--radius-sm);font-size:.86rem;font-weight:600;background:var(--white);color:var(--gray-800);border:1.5px solid var(--gray-200);display:flex;align-items:center;justify-content:center;gap:.5rem;transition:background var(--tr),box-shadow var(--tr);cursor:pointer}
    .btn-google:hover{background:var(--gray-50);box-shadow:var(--shadow-sm)}
    .btn-google:disabled{opacity:.5;pointer-events:none}
    .google-icon{width:17px;height:17px;flex-shrink:0}
    .login-notice{margin-top:1.1rem;font-size:.7rem;color:var(--gray-600);text-align:center;line-height:1.6}
    .error-msg{background:#fce4ec;color:var(--red);padding:.52rem .75rem;border-radius:var(--radius-sm);font-size:.78rem;margin-bottom:.75rem;display:none}

    /* INVITE SCREEN */
    #inviteScreen{position:fixed;inset:0;background:var(--navy);display:none;align-items:center;justify-content:center;z-index:300;padding:1.5rem}
    #inviteScreen.show{display:flex}
    .invite-card{background:var(--white);border-radius:var(--radius-lg);padding:1.7rem 1.4rem;width:100%;max-width:350px;box-shadow:0 8px 32px rgba(0,0,0,.25);text-align:center}
    .invite-card__icon{font-size:2.6rem;margin-bottom:.55rem}
    .invite-card__title{font-size:1rem;font-weight:700;color:var(--navy);margin-bottom:.35rem}
    .invite-card__sub{font-size:.8rem;color:var(--gray-600);margin-bottom:1.1rem;line-height:1.6}
    .role-badge{display:inline-block;background:var(--gold);color:var(--white);padding:.22rem .75rem;border-radius:20px;font-size:.8rem;font-weight:700;margin-bottom:1.1rem}

    /* SCORE INPUT */
    .score-input-row{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:.4rem}
    .score-input-row input{text-align:center;font-size:1.15rem;font-weight:700}
    .score-vs{color:var(--gray-400);font-size:.8rem;font-weight:600;text-align:center}
    .score-team-label{font-size:.7rem;color:var(--gray-600);text-align:center;margin-bottom:.18rem}

    /* HOME BANNER */
    .team-banner{background:var(--navy);border-radius:var(--radius-md);padding:.75rem .9rem;display:flex;align-items:center;gap:.75rem;margin-bottom:.9rem}
    .team-banner img{width:85px;object-fit:contain;border-radius:3px}
    .team-banner__name{font-size:.95rem;font-weight:800;color:var(--gold)}
    .team-banner__sub{font-size:.72rem;color:rgba(255,255,255,.7);margin-top:.12rem}

    /* PC SIDEBAR */
    @media(min-width:768px){
      body{padding-bottom:0;padding-left:205px}
      .bottom-nav{display:none}
      .sidebar{display:flex;flex-direction:column;position:fixed;left:0;top:0;bottom:0;width:205px;background:var(--navy);padding:1.1rem 0 1rem;overflow-y:auto;z-index:100}
      .sidebar__logo{padding:.5rem .95rem 1.1rem;border-bottom:1px solid rgba(255,255,255,.1);margin-bottom:.7rem}
      .sidebar__logo img{width:40px;height:40px;border-radius:7px;margin-bottom:.35rem}
      .sidebar__logoname{font-size:.86rem;font-weight:700;color:var(--gold)}
      .sidebar__item{display:flex;align-items:center;gap:.5rem;padding:.58rem .95rem;color:rgba(255,255,255,.7);font-size:.8rem;font-weight:500;transition:background var(--tr),color var(--tr);background:none;border:none;width:100%;cursor:pointer;text-align:left}
      .sidebar__item:hover,.sidebar__item.active{background:rgba(255,255,255,.1);color:var(--white)}
      .sidebar__item.active{border-left:3px solid var(--gold)}
      .sidebar__item svg{width:16px;height:16px;flex-shrink:0}
      .sidebar__footer{margin-top:auto;padding:.7rem .95rem 0;border-top:1px solid rgba(255,255,255,.1)}
      .sidebar__username{font-size:.68rem;color:rgba(255,255,255,.5);margin-bottom:.35rem}
      .fab{bottom:1.4rem!important;right:1.4rem!important}
    }
    @media(max-width:767px){.sidebar{display:none}}
  </style>
</head>

const fmtDate = s => { if(!s)return""; const d=new Date(s+"T00:00:00"); return `${d.getMonth()+1}/${d.getDate()}（${"日月火水木金土"[d.getDay()]}）`; };
const fmtDateFull = s => { if(!s)return""; const d=new Date(s+"T00:00:00"); return `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日（${"日月火水木金土"[d.getDay()]}）`; };
const fmtMonth = s => { const d=new Date(s+"T00:00:00"); return `${d.getFullYear()}年${d.getMonth()+1}月`; };
const fmtTS = ts => { if(!ts)return""; const d=ts.toDate?ts.toDate():new Date(ts); return `${d.getFullYear()}/${d.getMonth()+1}/${d.getDate()}`; };
const TL = {practice:"練習",friendly:"練習試合",official:"公式戦"};
const TB = {practice:"badge--practice",friendly:"badge--friendly",official:"badge--official"};
const RB = {"勝":"badge--win","負":"badge--lose","分":"badge--draw"};

function toast(msg, type="") {
  const c=$("toastContainer"), t=document.createElement("div");
  t.className=`toast${type?` toast--${type}`:""}`;t.textContent=msg;
  c.appendChild(t);setTimeout(()=>t.remove(),3000);
}
function openModal(title, html) { $("modalTitle").textContent=title; $("modalBody").innerHTML=html; $("modalOverlay").classList.remove("hidden"); }
function closeModal() { $("modalOverlay").classList.add("hidden"); }
$("modalClose").addEventListener("click",closeModal);
$("modalOverlay").addEventListener("click",e=>{if(e.target===$("modalOverlay"))closeModal();});

async function getMember(uid) {
  const snap=await getDoc(doc(db,"teams",TEAM_ID,"members",uid));
  return snap.exists()?{id:snap.id,...snap.data()}:null;
}
async function createInvite(role) {
  const token=crypto.randomUUID();
  await setDoc(doc(db,"teams",TEAM_ID,"invites",token),{role,createdAt:serverTimestamp(),used:false,expiresAt:new Date(Date.now()+7*24*60*60*1000)});
  return token;
}
async function validateInvite(token) {
  const snap=await getDoc(doc(db,"teams",TEAM_ID,"invites",token));
  if(!snap.exists())return null;
  const d=snap.data();
  if(d.used||d.expiresAt.toDate()<new Date())return null;
  return d;
}
async function consumeInvite(token,uid,displayName,email) {
  const invite=await validateInvite(token);
  if(!invite)throw new Error("招待URLが無効または期限切れです");
  await setDoc(doc(db,"teams",TEAM_ID,"members",uid),{displayName,email,role:invite.role,playerIds:[],createdAt:serverTimestamp()});
  await updateDoc(doc(db,"teams",TEAM_ID,"invites",token),{used:true,usedBy:uid,usedAt:serverTimestamp()});
  return invite.role;
}

// NAVIGATION
function navigate(page) {
  document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
  const el=$(`page-${page}`); if(el)el.classList.add("active");
  document.querySelectorAll("[data-page]").forEach(b=>b.classList.toggle("active",b.dataset.page===page));
  $("fab").style.display="none";
  loadPage(page);
}
document.querySelectorAll("[data-page]").forEach(btn=>btn.addEventListener("click",()=>navigate(btn.dataset.page)));

async function loadPage(page) {
  if(page==="home")await loadHome();
  else if(page==="schedule")await loadSchedule();
  else if(page==="result")await loadResult();
  else if(page==="players")await loadPlayers();
  else if(page==="notice")await loadNotice();
  else if(page==="members")await loadMembers();
}

// SCHEDULE
async function loadSchedule() {
  $("scheduleList").innerHTML=`<div class="loading"><div class="spinner"></div></div>`;
  const snap=await getDocs(query(collection(db,"teams",TEAM_ID,"schedules"),orderBy("date","asc")));
  schedules=snap.docs.map(d=>({id:d.id,...d.data()}));
  if(currentMember.role==="admin"){$("fab").style.display="flex";$("fab").onclick=()=>openScheduleForm(null);}
  renderScheduleList();
}
function renderScheduleList() {
  const today=new Date().toISOString().split("T")[0];
  const filtered=currentFilter==="all"?schedules:schedules.filter(s=>s.type===currentFilter);
  if(!filtered.length){$("scheduleList").innerHTML=`<div class="empty-state"><div class="empty-state__icon">📅</div><div class="empty-state__title">予定はありません</div></div>`;return;}
  const grouped={};
  filtered.forEach(s=>{const m=fmtMonth(s.date);if(!grouped[m])grouped[m]=[];grouped[m].push(s);});
  $("scheduleList").innerHTML=Object.entries(grouped).map(([month,items])=>`
    <div style="font-size:.68rem;font-weight:700;color:var(--navy);letter-spacing:.05em;padding:.32rem 0 .22rem;border-bottom:1px solid var(--gray-200);margin-bottom:.38rem">${month}</div>
    ${items.map(s=>`<div class="card card--click" style="${s.date<today?"opacity:.6":""}" onclick="showScheduleDetail('${s.id}')">
      <div style="display:flex;align-items:center;gap:.38rem;margin-bottom:.28rem">
        <span class="badge ${TB[s.type]||'badge--practice'}">${TL[s.type]||s.type}</span>
        <span style="font-size:.75rem;color:var(--gray-600)">${fmtDate(s.date)} ${s.startTime?s.startTime+"〜":""}</span>
      </div>
      <div class="card__title" style="font-size:.88rem">${s.title}</div>
      ${s.location?`<div class="card__sub">📍 ${s.location}</div>`:''}
    </div>`).join("")}
  `).join("");
}
document.querySelectorAll(".filter-tab").forEach(tab=>{
  tab.addEventListener("click",()=>{
    document.querySelectorAll(".filter-tab").forEach(t=>{t.className="btn btn--ghost btn--sm filter-tab";});
    tab.className="btn btn--primary btn--sm filter-tab";
    currentFilter=tab.dataset.filter; renderScheduleList();
  });
});

  const attSnap=await getDoc(doc(db,"teams",TEAM_ID,"attendance",id,"responses",currentUser.uid));
  const myResponses=attSnap.exists()?attSnap.data().responses||[];
  const pSnap=await getDocs(query(collection(db,"teams",TEAM_ID,"players"),orderBy("number","asc")));
  players=pSnap.docs.map(d=>({id:d.id,...d.data()}));
  const myPlayers=players.filter(p=>currentMember.playerIds?.includes(p.id));
  const isAdmin=currentMember.role==="admin";
  let allAttHtml="";
  if(isAdmin){
    const aSnap=await getDocs(collection(db,"teams",TEAM_ID,"attendance",id,"responses"));
    const allAtt=aSnap.docs.map(d=>d.data());
    allAttHtml=`<div style="border-top:1px solid var(--gray-200);margin-top:.9rem;padding-top:.75rem">
      <div class="form-label" style="margin-bottom:.45rem">出欠状況（管理者）</div>
      ${allAtt.length===0?`<p style="font-size:.78rem;color:var(--gray-600)">まだ回答がありません</p>`:
        allAtt.map(ua=>ua.responses?.map(r=>`<div style="display:flex;align-items:center;justify-content:space-between;padding:.38rem 0;border-bottom:1px solid var(--gray-100)">
          <span style="font-size:.83rem">${r.playerName||r.playerId}</span>
          <span style="font-size:.95rem;font-weight:700;color:${r.status==="○"?"#2e7d32":r.status==="×"?"#c62828":"#f9a825"}">${r.status||"?"}</span>
        </div>`).join("")).join("")}
    </div>
    <div style="display:flex;gap:.38rem;margin-top:.75rem">
      <button class="btn btn--ghost btn--full btn--sm" onclick="openScheduleForm('${s.id}')">編集</button>
      <button class="btn btn--danger btn--full btn--sm" onclick="delSchedule('${s.id}')">削除</button>
    </div>`;
  }
  openModal("予定の詳細",`
    <span class="badge ${TB[s.type]||'badge--practice'}">${TL[s.type]||s.type}</span>
    <div style="margin:.65rem 0"><div class="form-label">日時</div><div style="font-size:.88rem">${fmtDateFull(s.date)} ${s.startTime?s.startTime+"〜"+(s.endTime||""):""}</div></div>
    ${s.location?`<div style="margin-bottom:.65rem"><div class="form-label">場所</div><div style="font-size:.88rem">📍 ${s.location}</div></div>`:""}
    ${s.note?`<div style="margin-bottom:.65rem"><div class="form-label">備考</div><div style="font-size:.82rem;color:var(--gray-600)">${s.note}</div></div>`:""}
    <div style="border-top:1px solid var(--gray-200);padding-top:.75rem;margin-top:.5rem">
      <div class="form-label" style="margin-bottom:.45rem">出欠の入力</div>
      ${myPlayers.length===0?`<p style="font-size:.78rem;color:var(--gray-600)">選手が紐付けられていません。メンバー管理から設定してください。</p>`:
        myPlayers.map(p=>{const cur=myResponses.find(r=>r.playerId===p.id)?.status||"";
          return `<div class="att-player-row">
            <div class="att-player-name">${p.name} <span style="font-size:.7rem;color:var(--gray-600)">${p.grade}年 #${p.number}</span></div>
            <div class="att-btns" style="gap:.22rem">
              ${["○","△","×"].map(st=>`<button class="att-btn ${cur===st?`sel-${st}`:""}" data-pid="${p.id}" data-st="${st}" onclick="selectAtt('${s.id}','${p.id}','${st}',this)">${st}</button>`).join("")}
            </div>
          </div>`;
        }).join("")}
    </div>${allAttHtml}`);
};

window.selectAtt = async function(scheduleId,playerId,status,btn) {
  document.querySelectorAll(`[data-pid="${playerId}"]`).forEach(b=>b.className="att-btn");
  btn.classList.add(`sel-${status}`);
  const rows=document.querySelectorAll(".att-player-row"), responses=[];
  rows.forEach(row=>{
    const pid=row.querySelector("[data-pid]")?.dataset.pid;
    const sel=row.querySelector(".att-btn[class*='sel-']");
    if(pid&&sel){const p=players.find(x=>x.id===pid);responses.push({playerId:pid,playerName:p?.name||pid,status:sel.dataset.st});}
  });
  try{await setDoc(doc(db,"teams",TEAM_ID,"attendance",scheduleId,"responses",currentUser.uid),{responses,updatedAt:serverTimestamp()},{merge:true});toast("出欠を保存しました","success");}
  catch(e){toast("保存に失敗しました","error");}
};

    try{
      const data={title,type:$("f_type").value,date,startTime:$("f_st").value,endTime:$("f_et").value,location:$("f_loc").value.trim(),note:$("f_note").value.trim(),createdBy:currentUser.uid};

window.delSchedule = async function(id) {
  if(!confirm("この予定を削除しますか？"))return;
  await deleteDoc(doc(db,"teams",TEAM_ID,"schedules",id));
  closeModal();await loadSchedule();toast("削除しました");
};

window.delResult = async function(id) {
  if(!confirm("この試合結果を削除しますか？"))return;
  await deleteDoc(doc(db,"teams",TEAM_ID,"results",id));
  closeModal();await loadResult();toast("削除しました");
};

// PLAYERS
async function loadPlayers() {
  $("playerList").innerHTML=`<div class="loading"><div class="spinner"></div></div>`;
  const snap=await getDocs(query(collection(db,"teams",TEAM_ID,"players"),orderBy("number","asc")));
  players=snap.docs.map(d=>({id:d.id,...d.data()}));
  $("playerCount").textContent=`${players.length}名登録中`;
  if(currentMember.role==="admin"){$("fab").style.display="flex";$("fab").onclick=()=>openPlayerForm(null);}
  if(!players.length){$("playerList").innerHTML=`<div class="empty-state"><div class="empty-state__icon">👥</div><div class="empty-state__title">選手が登録されていません</div></div>`;return;}
  const grades={};
  players.forEach(p=>{const g=p.grade||"?";if(!grades[g])grades[g]=[];grades[g].push(p);});
  $("playerList").innerHTML=Object.keys(grades).sort((a,b)=>Number(a)-Number(b)).map(g=>`
    <div class="grade-label">${g}年生</div>
    <div class="player-grid">${grades[g].map(p=>`<div class="player-card" onclick="openPlayerForm('${p.id}')">
      <div class="player-card__num">#${p.number||'—'}</div>
      <div class="player-card__name">${p.name}</div>
      <div class="player-card__meta">${p.bats||'?'}打 ${p.throws||'?'}投</div>
    </div>`).join("")}</div>`).join("");
}
window.openPlayerForm = function(id) {
  if(currentMember.role!=="admin")return;
  const p=id?players.find(x=>x.id===id):null;
  openModal(p?"選手を編集":"選手を登録",`
    <div class="form-group"><label class="form-label">氏名 *</label><input id="f_name" value="${p?.name||''}" placeholder="例：松山 太郎"></div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">学年 *</label><select id="f_grade">${[1,2,3,4,5,6].map(g=>`<option value="${g}" ${p?.grade==g?'selected':''}>${g}年</option>`).join("")}</select></div>
      <div class="form-group"><label class="form-label">背番号</label><input type="number" id="f_num" value="${p?.number||''}" min="0" max="99"></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">打席</label><select id="f_bats">
        <option value="右" ${p?.bats==='右'?'selected':''}>右打</option>
        <option value="左" ${p?.bats==='左'?'selected':''}>左打</option>
        <option value="両" ${p?.bats==='両'?'selected':''}>両打</option>
      </select></div>
      <div class="form-group"><label class="form-label">投球</label><select id="f_throws">
        <option value="右" ${p?.throws==='右'?'selected':''}>右投</option>
        <option value="左" ${p?.throws==='左'?'selected':''}>左投</option>
      </select></div>
    </div>
    <button class="btn btn--primary btn--full" id="savePlBtn" style="margin-bottom:.38rem">保存する</button>
    ${p?`<button class="btn btn--danger btn--full" id="delPlBtn">削除</button>`:""}`);
  $("savePlBtn").addEventListener("click",async()=>{
    const name=$("f_name").value.trim();if(!name){toast("氏名は必須です","error");return;}
    $("savePlBtn").disabled=true;$("savePlBtn").textContent="保存中...";
    try{
      const data={name,grade:parseInt($("f_grade").value),number:parseInt($("f_num").value)||0,bats:$("f_bats").value,throws:$("f_throws").value};
      if(p?.id)await updateDoc(doc(db,"teams",TEAM_ID,"players",p.id),{...data,updatedAt:serverTimestamp()});
      else await addDoc(collection(db,"teams",TEAM_ID,"players"),{...data,createdAt:serverTimestamp(),updatedAt:serverTimestamp()});
      closeModal();await loadPlayers();toast(p?"更新しました":"登録しました","success");
    }catch(e){toast("保存に失敗しました","error");$("savePlBtn").disabled=false;$("savePlBtn").textContent="保存する";}
  });
  $("delPlBtn")?.addEventListener("click",async()=>{
    if(!confirm(`${p.name}を削除しますか？`))return;
    await deleteDoc(doc(db,"teams",TEAM_ID,"players",p.id));
    closeModal();await loadPlayers();toast("削除しました");
  });
};

// NOTICE
async function loadNotice() {
  $("noticeList").innerHTML=`<div class="loading"><div class="spinner"></div></div>`;
  const snap=await getDocs(query(collection(db,"teams",TEAM_ID,"notices"),orderBy("createdAt","desc")));
  notices=snap.docs.map(d=>({id:d.id,...d.data()}));
  if(currentMember.role==="admin"){$("fab").style.display="flex";$("fab").onclick=()=>openNoticeForm();}
  if(!notices.length){$("noticeList").innerHTML=`<div class="empty-state"><div class="empty-state__icon">📢</div><div class="empty-state__title">お知らせはありません</div></div>`;return;}
  $("noticeList").innerHTML=notices.map(n=>`<div class="card card--click" onclick="showNoticeDetail('${n.id}')">
    ${n.pinned?`<div style="font-size:.68rem;color:var(--gold);font-weight:700;margin-bottom:.22rem">📌 固定</div>`:""}
    <div class="card__title">${n.title}</div>
    <div class="card__sub" style="margin-top:.22rem;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden">${n.body}</div>
    <div style="font-size:.68rem;color:var(--gray-400);margin-top:.38rem">${fmtTS(n.createdAt)}</div>
  </div>`).join("");
}
window.showNoticeDetail = function(id) {
  const n=notices.find(x=>x.id===id);if(!n)return;
  openModal(n.title,`
    <div style="font-size:.7rem;color:var(--gray-400);margin-bottom:.75rem">${fmtTS(n.createdAt)}</div>
    <div style="font-size:.88rem;line-height:1.8;white-space:pre-wrap">${n.body}</div>
    ${currentMember.role==="admin"?`<button class="btn btn--danger btn--full btn--sm" style="margin-top:1.1rem" onclick="delNotice('${n.id}')">削除</button>`:""}`);
};
window.openNoticeForm = function() {
  openModal("お知らせを投稿",`
    <div class="form-group"><label class="form-label">タイトル *</label><input id="f_ntitle" placeholder="例：練習日程変更のお知らせ"></div>
    <div class="form-group"><label class="form-label">本文 *</label><textarea id="f_nbody" style="min-height:120px" placeholder="内容を入力してください"></textarea></div>
    <div class="form-group" style="display:flex;align-items:center;gap:.45rem">
      <input type="checkbox" id="f_pinned" style="width:auto;accent-color:var(--navy)">
      <label for="f_pinned" class="form-label" style="margin:0">上部に固定する</label>
    </div>
    <button class="btn btn--primary btn--full" id="saveNBtn">投稿する</button>`);
  $("saveNBtn").addEventListener("click",async()=>{
    const title=$("f_ntitle").value.trim(),body=$("f_nbody").value.trim();
    if(!title||!body){toast("タイトルと本文は必須です","error");return;}
    $("saveNBtn").disabled=true;$("saveNBtn").textContent="投稿中...";
    try{
      await addDoc(collection(db,"teams",TEAM_ID,"notices"),{title,body,pinned:$("f_pinned").checked,createdBy:currentUser.uid,createdAt:serverTimestamp()});
      closeModal();await loadNotice();toast("投稿しました","success");
    }catch(e){toast("投稿に失敗しました","error");$("saveNBtn").disabled=false;$("saveNBtn").textContent="投稿する";}
  });
};
window.delNotice = async function(id) {
  if(!confirm("このお知らせを削除しますか？"))return;
  await deleteDoc(doc(db,"teams",TEAM_ID,"notices",id));
  closeModal();await loadNotice();toast("削除しました");
};

// MEMBERS
async function loadMembers() {
  const [mSnap,pSnap]=await Promise.all([getDocs(collection(db,"teams",TEAM_ID,"members")),getDocs(query(collection(db,"teams",TEAM_ID,"players"),orderBy("number","asc")))]);
  members=mSnap.docs.map(d=>({id:d.id,...d.data()}));
  players=pSnap.docs.map(d=>({id:d.id,...d.data()}));
  $("memberCount").textContent=`${members.length}名登録中`;
  $("memberList").innerHTML=members.map(m=>{
    const mp=players.filter(p=>m.playerIds?.includes(p.id));
    return `<div class="member-row" onclick="openMemberForm('${m.id}')">
      <div class="member-avatar">${(m.displayName||"?")[0]}</div>
      <div class="member-info">
        <div class="member-name">${m.displayName||"（未設定）"}</div>
        <div class="member-email">${m.email||""}</div>
        <div class="player-tags">${mp.map(p=>`<span class="player-tag">${p.name}</span>`).join("")}</div>
      </div>
      <span class="badge ${m.role==='admin'?'badge--admin':'badge--parent'}">${m.role==='admin'?'管理者':'保護者'}</span>
    </div>`;
  }).join("");
}
window.openMemberForm = function(uid) {
  const m=members.find(x=>x.id===uid);if(!m)return;
  openModal(m.displayName||"メンバー設定",`
    <div class="form-group"><label class="form-label">権限</label><select id="f_role">
      <option value="parent" ${m.role==='parent'?'selected':''}>保護者</option>
      <option value="admin" ${m.role==='admin'?'selected':''}>管理者</option>
    </select></div>
    <div class="form-group"><label class="form-label">紐付ける選手</label>
      ${players.map(p=>`<label style="display:flex;align-items:center;gap:.45rem;padding:.32rem 0;cursor:pointer">
        <input type="checkbox" value="${p.id}" ${m.playerIds?.includes(p.id)?'checked':''} style="width:auto;accent-color:var(--navy)">
        <span style="font-size:.83rem">${p.name}（${p.grade}年 #${p.number}）</span>
      </label>`).join("")}
      ${players.length===0?`<p style="font-size:.78rem;color:var(--gray-600)">選手が登録されていません</p>`:""}
    </div>
    <button class="btn btn--primary btn--full" id="saveMBtn">保存する</button>`);
  $("saveMBtn").addEventListener("click",async()=>{
    const role=$("f_role").value;
    const pids=[...document.querySelectorAll('#modalBody input[type=checkbox]:checked')].map(el=>el.value);
    $("saveMBtn").disabled=true;$("saveMBtn").textContent="保存中...";
    try{
      await updateDoc(doc(db,"teams",TEAM_ID,"members",uid),{role,playerIds:pids});
      closeModal();await loadMembers();toast("更新しました","success");
    }catch(e){toast("保存に失敗しました","error");$("saveMBtn").disabled=false;$("saveMBtn").textContent="保存する";}
  });
};
$("inviteParentBtn").addEventListener("click",async()=>{
  $("inviteParentBtn").disabled=true;
  try{const token=await createInvite("parent");const url=`${location.origin}${location.pathname}?token=${token}`;$("inviteUrlBox").textContent=url;$("inviteUrlBox").style.display="block";$("copyInviteBtn").style.display="inline-flex";$("copyInviteBtn").onclick=()=>navigator.clipboard.writeText(url).then(()=>toast("コピーしました","success"));}catch(e){toast("生成に失敗しました","error");}
  $("inviteParentBtn").disabled=false;
});
$("inviteAdminBtn").addEventListener("click",async()=>{
  $("inviteAdminBtn").disabled=true;
  try{const token=await createInvite("admin");const url=`${location.origin}${location.pathname}?token=${token}`;$("inviteUrlBox").textContent=url;$("inviteUrlBox").style.display="block";$("copyInviteBtn").style.display="inline-flex";$("copyInviteBtn").onclick=()=>navigator.clipboard.writeText(url).then(()=>toast("コピーしました","success"));}catch(e){toast("生成に失敗しました","error");}
  $("inviteAdminBtn").disabled=false;
});

// INVITE HANDLING
async function handleInviteToken(token,user) {
  $("inviteScreen").classList.add("show");$("loginScreen").style.display="none";
  const inviteCard=$("inviteCard");
  try{
    const existing=await getMember(user.uid);
    if(existing){$("inviteScreen").classList.remove("show");bootApp(user,existing);return;}
    const invite=await validateInvite(token);
    if(!invite){inviteCard.innerHTML=`<div class="invite-card__icon">⏰</div><div class="invite-card__title">招待URLが無効です</div><div class="invite-card__sub">期限切れまたは使用済みです</div>`;return;}
    const roleLabel=invite.role==="admin"?"管理者":"保護者";
    inviteCard.innerHTML=`<div class="invite-card__icon">⚾</div><div class="invite-card__title">松山SOUTHへようこそ！</div><div class="invite-card__sub">${user.displayName} さんを招待します</div><div class="role-badge">${roleLabel}</div><p style="font-size:.78rem;color:var(--gray-600);margin-bottom:.9rem">上記の権限でチームに参加します</p><button class="btn btn--primary btn--full" id="joinBtn">チームに参加する</button>`;
    $("joinBtn").addEventListener("click",async()=>{
      $("joinBtn").disabled=true;$("joinBtn").textContent="登録中...";
      try{await consumeInvite(token,user.uid,user.displayName,user.email);const member=await getMember(user.uid);$("inviteScreen").classList.remove("show");bootApp(user,member);}
      catch(e){toast("エラーが発生しました","error");$("joinBtn").disabled=false;$("joinBtn").textContent="チームに参加する";}
    });
  }catch(e){inviteCard.innerHTML=`<div class="invite-card__sub" style="color:var(--red)">エラーが発生しました</div>`;}
}

// BOOT
function bootApp(user,member) {
  currentUser=user;currentMember=member;
  $("loginScreen").style.display="none";
  $("topbar").style.display="flex";
  $("topbarUser").textContent=member.displayName?.split(" ")[0]||"";
  $("sidebar").style.display="flex";
  $("bottomNav").style.display="flex";
  $("main").style.display="block";
  if(member.role==="admin")document.querySelectorAll(".admin-only").forEach(el=>el.style.display="");
  $("sidebarUser").textContent=member.displayName||"";
  navigate("home");
}

// AUTH
const googleSvg=`<svg class="google-icon" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>`;

$("loginBtn").addEventListener("click",async()=>{
  $("loginBtn").disabled=true;$("loginBtn").textContent="ログイン中...";$("loginError").style.display="none";
  try{
    const result=await signInWithPopup(auth,provider);
    const params=new URLSearchParams(location.search);const token=params.get("token");
    if(token){handleInviteToken(token,result.user);return;}
    const member=await getMember(result.user.uid);
    if(!member){$("loginError").textContent="このアカウントはチームに登録されていません。招待URLから参加してください。";$("loginError").style.display="block";await signOut(auth);$("loginBtn").disabled=false;$("loginBtn").innerHTML=`${googleSvg} Googleでログイン`;return;}
    bootApp(result.user,member);
  }catch(e){$("loginError").textContent="ログインに失敗しました。もう一度お試しください。";$("loginError").style.display="block";$("loginBtn").disabled=false;$("loginBtn").innerHTML=`${googleSvg} Googleでログイン`;}
});

const handleLogout=async()=>{if(confirm("ログアウトしますか？")){await signOut(auth);location.reload();}};
$("logoutBtn").addEventListener("click",handleLogout);
$("sidebarLogout").addEventListener("click",handleLogout);

onAuthStateChanged(auth,async user=>{
  if(!user)return;
  const params=new URLSearchParams(location.search);const token=params.get("token");
  if(token){handleInviteToken(token,user);return;}
  const member=await getMember(user.uid);
  if(member)bootApp(user,member);
});
</script>
